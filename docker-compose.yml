version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: aipr-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: aipr_db
      MYSQL_USER: aipr_user
      MYSQL_PASSWORD: aipr_password
    volumes:
      - mysql_data:/var/lib/mysql
      # Automatically initialize DB schema on startup if desired
      # - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    networks:
      - aipr-network

  redis:
    image: redis:7.0-alpine
    container_name: aipr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - aipr-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  aipr-network:
    driver: bridge
